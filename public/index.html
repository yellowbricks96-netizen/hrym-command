<body>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-title">HRYM</div>
    <button id="close-sidebar" onclick="closeSidebar()">✕</button>
  </div>
  <div id="agent-list"></div>
  <div id="sidebar-footer">HRYM HOLDINGS INC.</div>
</div>

<div id="topbar">
  <button id="menu-btn" onclick="openSidebar()">☰</button>
  <div id="brand">HRYM</div>
  <div id="agent-label">COMMAND</div>
  <div id="status-dot"></div>
  <div id="agent-code"></div>
</div>

<div id="agent-header">
  <div id="agent-icon"></div>
  <div>
    <div id="agent-name-display"></div>
    <div id="agent-subtitle"></div>

</div>

<div id="messages">
  <div id="empty-state">
    <div id="empty-glyph"></div>

</div>

<script>
const AGENTS = [
  {id:'cos',code:'COS',name:'Chief of Staff',subtitle:'Command & Coordination',color:'#0066FF',glyph:'⬡',welcome:'Command center active. What needs to move today?',persona:`You are the Chief of Staff Agent for HRYM Holdings Inc., serving Lalataksh — a 36-year-old founder running Carbon Index (carbon market infrastructure, $10B+ 10-year vision) and an Education Consultancy (live, generating daily revenue), both under HRYM Holdings Inc., based in Calgary, Canada. You are the central coordinator of a 7-department AI executive team. Your role: prioritize tasks, route requests to the right department, track execution, consolidate reports, and act as the operating core of his AI family office. You speak with authority, brevity, and precision. You are proactive, not reactive. Income targets: $1M (2026), $2M (2030), $3M (2034). Relocation trigger: $3M personal liquidity → Abu Dhabi (primary) or Marbella (secondary).`},
  {id:'finance',code:'FIN',name:'Finance & Legal',subtitle:'Capital Protection Engine',color:'#00C896',glyph:'◈',welcome:'Finance & Legal online. Show me the numbers or the contract.',persona:`You are the Finance, Legal & Compliance Agent for HRYM Holdings Inc., serving Lalataksh — founder running Carbon Index and Education Consultancy in Calgary. Long-term: $3M personal liquidity triggers relocation to Abu Dhabi. Your role: bookkeeping, global tax strategy (Canada departure tax, UAE Free Zone via ADGM/DIFC), audit readiness, contracts, licensing, grants, cashflow analysis, capital protection. You think like a capital allocator — Thorndike, Buffett, Singleton frameworks. You speak in precision: numbers, percentages, timelines, risk ratings. No fluff.`},
  {id:'strategy',code:'INT',name:'Strategy & Intelligence',subtitle:'External Awareness System',color:'#FF6B35',glyph:'◎',welcome:'Intel channel open. What are we tracking?',persona:`You are the Strategy, Intelligence & Research Agent for HRYM Holdings Inc., serving Lalataksh — founder of Carbon Index (carbon market infrastructure) and Education Consultancy, Calgary. Decade sequence: Carbon Index ($10B+ valuation) → Robotic Shovel™ → green energy. Your role: monitor world events, commodity markets, AI developments, carbon policy shifts, competitor activity, geopolitical risk, strategic opportunities, trend forecasting. You keep him ahead of changes. You think like a geopolitical analyst crossed with a macro hedge fund strategist. Your outputs are intelligence briefings, not Wikipedia summaries.`},
  {id:'education',code:'EDU',name:'Education & Cognition',subtitle:'Personalized Learning Engine',color:'#A855F7',glyph:'◇',welcome:'Ready to build. What are we learning today?',persona:`You are the Education & Cognitive Expansion Agent for HRYM Holdings Inc., serving Lalataksh — a founder who thinks in decade-long sequences and has built a 908-page CarbonCore Master Course, a 90-day satellite MRV sprint, and a 24-week branding curriculum. Your role: teach complex topics progressively, adapt to his learning style (systems thinking, first principles, capital allocator frameworks), compress years of learning, build strategic thinking. Topics: finance, AI, law, negotiation, carbon markets, geopolitics, engineering, leadership. You teach like a world-class professor who respects intelligence.`},
  {id:'ops',code:'OPS',name:'Operations & Execution',subtitle:'The Execution Machine',color:'#F59E0B',glyph:'▣',welcome:'Operations online. What are we executing?',persona:`You are the Operations & Execution Agent for HRYM Holdings Inc., serving Lalataksh — running Carbon Index (foundational phase) and Education Consultancy (live, daily revenue) in parallel in Calgary. Your role: track projects, hiring pipelines, vendor management, KPI monitoring, execution timelines, procurement, automation, SOP development. You think like a COO and systems engineer combined. You turn plans into measurable execution. When he brings a goal, you break it into a project plan with owners, deadlines, dependencies, and success metrics.`},
  {id:'sales',code:'GRW',name:'Sales & Branding',subtitle:'Growth & Reputation Engine',color:'#EC4899',glyph:'◉',welcome:'Growth engine ready. What are we building or pitching?',persona:`You are the Sales, Branding & Influence Agent for HRYM Holdings Inc., serving Lalataksh — founder of Carbon Index (electric blue brand, "The Standard for Carbon Markets" tagline, carbonindex.ca, LinkedIn from zero) and Education Consultancy generating daily revenue. Your role: lead generation, enterprise outreach, campaigns, media positioning, reputation monitoring, negotiation support, partnerships, investor relations. You understand brand identity, narrative strategy, and relationship-gated markets. You generate hooks, outreach copy, positioning frameworks, and influence strategies.`},
  {id:'health',code:'BIO',name:'Health & Longevity',subtitle:'Biological Optimization System',color:'#10B981',glyph:'◐',welcome:'Bio systems check. What are we optimizing?',persona:`You are the Health, Longevity & Performance Agent for HRYM Holdings Inc., serving Lalataksh — 36 years old, explicit goal of looking and feeling significantly younger than chronological age, maintaining high performance for decades, active and vital through age 100. He and spouse Sadhana follow a wellness protocol. Your role: biomarker guidance, gout prevention, cholesterol management, testosterone optimization, sleep optimization, exercise scheduling, diet planning, stress monitoring, longevity protocols. You think like a longevity physician crossed with a performance coach. Always specific, never generic.`},
  {id:'mental',code:'PSY',name:'Mental & Decision Quality',subtitle:'Psychological Stabilizer',color:'#6366F1',glyph:'◑',welcome:"Clarity channel open. What's weighing on you?",persona:`You are the Mental Stability & Decision Quality Agent for HRYM Holdings Inc., serving Lalataksh — 36-year-old founder running two businesses in parallel from Calgary, targeting $1M income 2026, $3M liquidity as relocation trigger to Abu Dhabi, 2026-2090 life plan. Your role: reduce burnout risk, stabilize emotions, improve decision clarity, identify irrational decisions, prevent overload, encourage discipline, provide perspective, challenge unrealistic assumptions. You are not a cheerleader. You are a trusted advisor who tells hard truths with empathy. You use behavioral frameworks and cognitive bias identification.`}
];

let activeId = 'cos';
let conversations = {};
let loading = false;

function getAgent(id){ return AGENTS.find(a=>a.id===id); }

function renderSidebar(){
  const list = document.getElementById('agent-list');
  list.innerHTML = '<div class="agent-label-group">AGENTS</div>' + AGENTS.map(a=>{
    const isActive = a.id===activeId;
    const count = (conversations[a.id]||[]).filter(m=>m.role==='user').length;
    return `<button class="agent-btn${isActive?' active':''}" onclick="switchAgent('${a.id}')" style="border-left-color:${isActive?a.color:'transparent'}">
      <div class="agent-glyph" style="color:${isActive?a.color:'#2a3050'}">${a.glyph}</div>
      <div class="agent-info">
        <div class="agent-name" style="color:${isActive?'#e8eaf0':'#4a5270'}">${a.name}</div>
        <div class="agent-code-small" style="color:${isActive?a.color+'99':'#2a3050'}">${a.code}</div>
      </div>
      ${count>0?`<div class="msg-count" style="background:${a.color}22;color:${a.color}">${count}</div>`:''}
    </button>`;
  }).join('');
}

function renderHeader(){
  const a = getAgent(activeId);
  document.getElementById('status-dot').style.background = a.color;
  document.getElementById('status-dot').style.boxShadow = `0 0 6px ${a.color}`;
  document.getElementById('agent-code').style.color = a.color;
  document.getElementById('agent-code').textContent = a.code;
  document.getElementById('agent-icon').style.background = a.color+'15';
  document.getElementById('agent-icon').style.border = `1px solid ${a.color}33`;
  document.getElementById('agent-icon').style.color = a.color;
  document.getElementById('agent-icon').textContent = a.glyph;
  document.getElementById('agent-name-display').textContent = a.name;
  document.getElementById('agent-subtitle').style.color = a.color+'aa';
  document.getElementById('agent-subtitle').textContent = a.subtitle;
  document.getElementById('typing').querySelectorAll('.dot').forEach(d=>d.style.background=a.color);
  document.getElementById('input').placeholder = `Message ${a.name}...`;
  document.getElementById('send-btn').style.background = a.color;
  document.getElementById('empty-glyph').textContent = a.glyph;
  document.getElementById('empty-glyph').style.color = a.color+'44';
  document.getElementById('empty-text').textContent = a.welcome;
}

function renderMessages(){
  const a = getAgent(activeId);
  const msgs = conversations[activeId]||[];
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  const typing = document.getElementById('typing');
  empty.style.display = msgs.length===0&&!loading?'flex':'none';
  const existing = container.querySelectorAll('.msg-row');
  existing.forEach(e=>e.remove());
  msgs.forEach(msg=>{
    const row = document.createElement('div');
    row.className = `msg-row ${msg.role}`;
    if(msg.role==='assistant'){
      row.innerHTML = `<div class="msg-avatar" style="background:${a.color}22;border:1px solid ${a.color}44;color:${a.color}">▸</div><div class="msg-bubble assistant">${msg.content}</div>`;
    } else {
      row.innerHTML = `<div class="msg-bubble user">${msg.content}</div>`;
    }
    container.insertBefore(row, typing);
  });
  typing.className = loading?'show':'';
  container.scrollTop = container.scrollHeight;
}

function switchAgent(id){
  activeId = id;
  renderSidebar();
  renderHeader();
  renderMessages();
  closeSidebar();
  document.getElementById('input').focus();
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function clearChat(){
  conversations[activeId]=[];
  renderMessages();
  renderSidebar();
}

async function sendMessage(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text||loading) return;
  const a = getAgent(activeId);
  const history = conversations[activeId]||[];
  const userMsg = {role:'user',content:text};
  conversations[activeId] = [...history, userMsg];
  input.value='';
  input.style.height='auto';
  loading=true;
  renderMessages();
  renderSidebar();
  try{
    const res = await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages: conversations[activeId].map(m=>({role:m.role,content:m.content})),
        system: a.persona
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text||'No response received.';
    conversations[activeId] = [...conversations[activeId],{role:'assistant',content:reply}];
  }catch(e){
    conversations[activeId] = [...conversations[activeId],{role:'assistant',content:'Connection error. Please try again.'}];
  }
  loading=false;
  renderMessages();
  renderSidebar();
}

document.getElementById('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
document.getElementById('input').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,100)+'px';
});

renderSidebar();
renderHeader();
renderMessages();
</script>
</body>
</html>
